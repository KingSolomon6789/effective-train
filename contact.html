<!DOCTYPE html>
<html lang="en">
<head>
    <title>TheTaskBridge | Contact Us</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!-- Bootstrap CSS CDN (Required for your grid layout) -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Custom Styles -->
    <style>
        /* Base Theme */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f1f5f9;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 24px;
            color: #3b82f6 !important;
        }

        /* Hero Section */
        .hero-wrap {
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-wrap .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7); /* Dark overlay */
        }
        .hero-wrap .text-center {
            position: relative;
            z-index: 2;
        }
        .hero-wrap h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 700;
        }
        .breadcrumbs a {
            color: #f97316;
            text-decoration: none;
        }
        .breadcrumbs a:hover {
            color: #ea580c;
        }

        /* Animated Glassmorphism Background Blobs */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 8s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #3b82f6; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #f97316; animation-delay: 2s; }
        .blob-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #8b5cf6; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        /* Contact Section */
        .ftco-section {
            padding: 6em 0;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphic Contact Form */
        .contact-wrap {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .contact-wrap h3 {
            color: #ffffff;
            font-weight: 700;
        }

        /* Form Inputs */
        label.label {
            color: #cbd5e1;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-radius: 10px;
            padding: 12px 15px;
            height: auto;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #f97316;
            box-shadow: 0 0 0 0.25rem rgba(249, 115, 22, 0.25);
            color: #ffffff;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Button */
        .btn-primary {
            background: #f97316;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
        }

        /* Info Boxes */
        .dbox {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .dbox:hover {
            transform: translateY(-5px);
        }
        .dbox .icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
            font-size: 24px;
            margin: 0 auto 15px;
        }
        .dbox p {
            color: #e2e8f0;
            margin: 0;
            font-weight: 500;
        }
        .submitting { color: #f97316; margin-top: 10px; font-weight: 500;}
    </style>
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">TheTask<span style="color:#fff;">Bridge</span></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav" aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="fa fa-bars"></span>
            </button>
            <div class="collapse navbar-collapse" id="ftco-nav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item active"><a href="#" class="nav-link" style="color:#f97316;">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <section class="hero-wrap">
        <div class="overlay"></div>
        <div class="container">
            <div class="row no-gutters slider-text align-items-center justify-content-center">
                <div class="col-md-9 text-center">
                    <h1 class="mb-3 bread">Get in Touch</h1>
                    <p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home <i class="fa fa-chevron-right" style="font-size: 12px; margin-left:5px;"></i></a></span> <span>Contact Us</span></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Contact Section -->
    <section class="ftco-section position-relative">
        <!-- Background Animated Blobs -->
        <div class="bg-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-12">
                    <div class="wrapper px-md-4">
                        
                        <!-- Contact Info Boxes -->
                        <div class="row d-flex justify-content-center mb-5 gap-4">
                            <div class="col-md-4">
                                <div class="dbox w-100 text-center">
                                    <div class="icon d-flex align-items-center justify-content-center">
                                        <span class="fa fa-map-marker"></span>
                                    </div>
                                    <div class="text">
                                        <p>Global Remote Support</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="dbox w-100 text-center">
                                    <div class="icon d-flex align-items-center justify-content-center">
                                        <span class="fa fa-envelope"></span>
                                    </div>
                                    <div class="text">
                                        <p>sa3150402@gmail.com</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Glassmorphic Form Container -->
                        <div class="row justify-content-center">
                            <div class="col-md-8">
                                <div class="contact-wrap w-100 p-md-5 p-4">
                                    <h3 class="mb-4 text-center">Send Us A Message</h3>
                                    
                                    <!-- Form -->
                                    <form method="POST" id="contactForm" name="contactForm" class="contactForm">
                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                    <label class="label" for="name">Full Name</label>
                                                    <input type="text" class="form-control" name="name" id="name" placeholder="Name" required>
                                                </div>
                                            </div>
                                            <div class="col-md-6"> 
                                                <div class="form-group">
                                                    <label class="label" for="email">Email Address</label>
                                                    <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                    <label class="label" for="subject">Subject</label>
                                                    <input type="text" class="form-control" name="subject" id="subject" placeholder="Subject" required>
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                    <label class="label" for="message">Message</label>
                                                    <textarea name="message" class="form-control" id="message" cols="30" rows="5" placeholder="Write your message here..." required></textarea>
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <div class="form-group text-center">
                                                    <button type="submit" class="btn btn-primary">Send Message</button>
                                                    <div class="submitting"></div>
                                                    <div id="autoreply-status" style="margin-top:8px;color:#f8fafc;font-weight:600;"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                    
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Essential Scripts (CDNs) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- EmailJS integration (Kept exactly as requested) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init('nw_sQuQt0R7ITv7gj');
        })();

        document.addEventListener('DOMContentLoaded', function(){
            var form = document.getElementById('contactForm');
            if (!form) return;
            form.addEventListener('submit', function(e){
                e.preventDefault();
                var submitting = form.querySelector('.submitting');
                if (submitting) submitting.textContent = 'Sending... Please wait.';

                // send main message using provided template
                emailjs.sendForm('service_ezqtjbh', 'template_ewbfs6m', this)
                    .then(function(){
                        // prepare autoreply params from form fields
                        var params = {
                            to_email: ((form.querySelector('#email') || {}).value || '').trim(),
                            from_name: (form.querySelector('#name') || {}).value || '',
                            subject: (form.querySelector('#subject') || {}).value || '',
                            message: (form.querySelector('#message') || {}).value || ''
                        };

                        // Guard: if recipient is empty, skip autoreply and report
                        if (!params.to_email) {
                            console.warn('Autoreply skipped: recipient email is empty.');
                        } else {

                        var appendHiddenField = function(parent, name, value) {
                            var input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = name;
                            input.value = value;
                            parent.appendChild(input);
                        };

                            var autoreplyForm = document.createElement('form');
                            autoreplyForm.style.display = 'none';
                            // include multiple common field names so template/service can pick them
                            appendHiddenField(autoreplyForm, 'to_email', params.to_email);
                            appendHiddenField(autoreplyForm, 'to', params.to_email);
                            appendHiddenField(autoreplyForm, 'reply_to', params.to_email);
                            appendHiddenField(autoreplyForm, 'recipient', params.to_email);
                            appendHiddenField(autoreplyForm, 'to_name', params.from_name);
                            appendHiddenField(autoreplyForm, 'from_name', params.from_name);
                            appendHiddenField(autoreplyForm, 'subject', params.subject);
                            appendHiddenField(autoreplyForm, 'message', params.message);
                            document.body.appendChild(autoreplyForm);

                            console.log('Sending autoreply to', params.to_email, 'using fields to_email/to/reply_to/recipient');

                            emailjs.sendForm('service_ezqtjbh', 'template_itd6zfu', autoreplyForm)
                            .then(function(){
                                console.log('Autoreply sent for', params.to_email);
                            })
                            .catch(function(err){
                                console.error('Autoreply failed:', err);
                            })
                            .finally(function(){
                                document.body.removeChild(autoreplyForm);
                            });
                        }

                        alert('Message sent successfully. We will get back to you soon!');
                        form.reset();
                        if (submitting) submitting.textContent = '';
                    }, function(err){
                        alert('Failed to send message. Error: ' + (err && err.text));
                        if (submitting) submitting.textContent = '';
                    });
            });
        });
    </script>
</body>
</html>
